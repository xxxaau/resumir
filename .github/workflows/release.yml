name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    name: Build i publicar release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Instal·lar dependències
        run: npm ci

      - name: Build Firefox i Chromium ZIPs
        run: node scripts/build.mjs all

      - name: Prerelease audit
        run: npm run prerelease

      - name: Verificar vendors (SHA-256)
        run: npm run vendor:verify

      - name: web-ext lint (AMO compliance)
        run: npx web-ext lint --source-dir . --ignore-files 'node_modules/**' 'tests/**' 'scripts/**' '*.zip'

      - name: Crear GitHub Release amb els ZIPs
        uses: softprops/action-gh-release@v3
        with:
          files: build/resumir-contingut-*.zip
          body: |-
            ## Instal·lació

            ### Firefox
            L'extensió es distribueix via Mozilla Add-ons:
            https://addons.mozilla.org/en-US/firefox/addon/resumir

            ### Chrome / Edge / Brave
            1. Baixa el fitxer \`resumir-contingut-chromium.zip\` dels fitxers adjunts
            2. Descomprimeix-lo en una carpeta
            3. Obre \`chrome://extensions\`, activa el «Mode de desenvolupador»
            4. Fes clic a «Carrega extensió desempaquetada» i selecciona la carpeta

            ---

            ## Novetats de la versió
          generate_release_notes: true
