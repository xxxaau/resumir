name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    name: Build i publicar release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instal·lar dependències de dev
        run: npm ci

      - name: Tests unitaris
        run: npm test

      - name: Lint (ESLint)
        run: npm run lint

      - name: web-ext lint
        run: npx web-ext lint --source-dir . --ignore-files 'node_modules/**' 'tests/**' 'scripts/**' '*.zip'

      - name: Build Firefox i Chromium ZIPs
        run: node scripts/build.mjs all

      - name: Crear GitHub Release amb els ZIPs
        uses: softprops/action-gh-release@v2
        with:
          files: build/resumir-contingut-*.zip
          generate_release_notes: true
