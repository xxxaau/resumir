name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    name: Lint i tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instal·lar dependències de dev
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Tests unitaris
        run: npm test

      - name: Build (Firefox + Chromium)
        run: npm run build

      - name: Pre-release check
        run: npm run prerelease

      - name: Verificar vendors
        run: npm run vendor:verify

      - name: web-ext lint (Firefox)
        run: npx web-ext lint --source-dir . --ignore-files 'node_modules/**' 'tests/**' 'scripts/**' '*.test.*' '*.zip'
