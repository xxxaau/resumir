name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    name: Lint i tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instal·lar dependències de dev
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Tests unitaris
        run: npm test
