<!doctype html>
<html lang="ca">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resumidor</title>
    <link rel="stylesheet" href="sidebar.css" />
    <script src="../theme.js"></script>
  </head>
  <body>
    <div id="container">
      <div class="toolbar">
        <button
          id="summarizeBtn"
          class="action-btn primary"
          title="Resumeix"
          aria-label="Resumeix"
        >
          <svg
            aria-hidden="true"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polygon points="5 3 19 12 5 21 5 3"></polygon>
          </svg>
        </button>
        <button
          id="obsidianBtn"
          class="action-btn secondary"
          title="Guardar a Obsidian"
          aria-label="Guardar a Obsidian"
          disabled
        >
          <svg
            aria-hidden="true"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M6 3h12l4 6-10 13L2 9z" />
            <path d="M11 3 8 9l4 13 4-13-3-6" />
            <path d="M2 9h20" />
          </svg>
        </button>
        <button
          id="bionicBtn"
          class="icon-btn"
          title="Lectura biònica"
          aria-label="Lectura biònica"
        >
          <svg
            viewBox="0 0 24 24"
            fill="none"
            class="icon"
            stroke="currentColor"
            aria-hidden="true"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
            />
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
            />
          </svg>
        </button>

        <!-- Deep Dive Button (Hidden by default) -->
        <button
          id="deepDiveBtn"
          class="icon-btn"
          title="Aprofundeix"
          aria-label="Aprofundeix"
        >
          <svg
            viewBox="0 0 24 24"
            fill="none"
            class="icon"
            stroke="currentColor"
            aria-hidden="true"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M12 4v16m8-8H4"
            />
          </svg>
        </button>

        <!-- Scientific Validation Button (Hidden by default) -->
        <button
          id="scienceBtn"
          class="icon-btn"
          title="Valida"
          aria-label="Valida"
        >
          <svg
            viewBox="0 0 24 24"
            fill="none"
            class="icon"
            stroke="currentColor"
            aria-hidden="true"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M9 2v2.789a4 4 0 0 1-.672 2.219l-4.734 7.1A4 4 0 0 0 7 20h10a4 4 0 0 0 3.406-6.102l-4.734-7.1A4 4 0 0 1 15 4.789V2"
            />
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M9 2h6"
            />
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M14 15h-4"
            />
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M16 11h-4"
            />
          </svg>
        </button>
        <button
          id="copyBtn"
          class="icon-btn"
          title="Copiar text Markdown"
          aria-label="Copiar Markdown"
          disabled
        >
          <svg
            aria-hidden="true"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M4 17V7l4 5 4-5v10"></path>
            <path d="M15 7h2a5 5 0 0 1 0 10h-2V7z"></path>
          </svg>
        </button>
        <button
          id="settingsBtn"
          class="action-btn secondary"
          title="Configuració"
          aria-label="Configuració"
        >
          <svg
            aria-hidden="true"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="currentColor"
            stroke="none"
          >
            <path
              d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.488.488 0 0 0-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 0 0-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.56-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .43-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.03-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"
            />
          </svg>
        </button>
      </div>
      <div id="page-title-strip" class="hidden">
        <a id="page-title-link" href="#" target="_blank" rel="noopener noreferrer" title="Anar a la pàgina original" aria-label="Anar a la pàgina original">Pàgina original</a>
      </div>
      <div id="history-back-bar" class="hidden">
        <button id="historyBackBtn" class="history-back-btn">&#8592; Tornar a l'historial</button>
      </div>
      <div id="content" class="hidden"></div>
      <div id="loading" class="hidden" role="status" aria-live="polite">
        <span class="loading-dot">.</span><span class="loading-dot">.</span><span class="loading-dot">.</span>
      </div>
      <div id="error" class="hidden" role="alert" aria-live="assertive"></div>
      <div id="history-panel" class="hidden"></div>
      <div id="source-panel" class="hidden"></div>
    </div>

    <div id="footer-status" class="hidden">
      <div class="footer-section footer-section-left">
        <select id="model-select" aria-label="Selecciona model">
          <!-- Options populated by JS -->
        </select>
        <span class="section-divider">·</span>
        <span id="generation-timer" title="Temps de resposta">0.0s</span>
        <span class="section-divider">·</span>
        <span id="tokens-out-wrapper">
          <span id="tokens-out" title="0 Tokens rebuts"><span id="tokens-out-count">0.0</span> <span class="token-label">↓</span></span>
        </span>
        <span class="section-divider">·</span>
        <span id="tokens-indicator" title="Tokens enviats / Tokens rebuts">
          <span id="tokens-in" title="0 Tokens enviats"><span id="tokens-in-count">0.0</span> <span class="token-label">↑</span></span>
        </span>
      </div>

      <div class="footer-section footer-section-right">
        <span id="history-cache-group">
          <span id="cache-badge" title="Resum en caché">⚡</span>
          <button
            id="sourceTextBtn"
            title="Veure text enviat a resumir"
            aria-label="Veure text enviat a resumir"
            disabled
            class="footer-btn"
          >
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
              <line x1="16" y1="13" x2="8" y2="13"/>
              <line x1="16" y1="17" x2="8" y2="17"/>
              <line x1="10" y1="9" x2="8" y2="9"/>
            </svg>
          </button>
          <button
            id="historyBtn"
            title="Historial"
            aria-label="Historial"
            class="footer-btn"
          >🕐</button>
        </span>
      </div>
    </div>
    <script src="../ext.js"></script>
    <script src="../shared/models.js"></script>
    <script src="../shared/defaults.js"></script>
    <script src="utils.js"></script>
    <script src="api.js"></script>
    <script src="youtube-track-select.js"></script>
    <script src="content.js"></script>
    <script src="cache.js"></script>
    <script src="stats.js"></script>
    <script src="ui.js"></script>
    <script src="summary.js"></script>
    <script src="history.js"></script>
    <script src="sidebar.js"></script>
  </body>
</html>
