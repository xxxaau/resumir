<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Resumir contingut</title>
  <link rel="stylesheet" href="sidebar.css">
  <script src="../theme.js"></script>
</head>
<body>
  <div id="container">
    <div class="toolbar">
      <button id="summarizeBtn" class="action-btn primary" title="Resumir Pàgina" aria-label="Resumir">
        <svg aria-hidden="true" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="5 3 19 12 5 21 5 3"></polygon>
        </svg>
      </button>
      <button id="copyBtn" class="action-btn secondary" title="Copiar com a Markdown" aria-label="Copiar Markdown" disabled>
        <svg aria-hidden="true" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 17V7l4 5 4-5v10"></path>
          <path d="M15 7h2a5 5 0 0 1 0 10h-2V7z"></path>
        </svg>
      </button>
      <button id="settingsBtn" class="action-btn secondary" title="Configuració" aria-label="Configuració">
        <svg aria-hidden="true" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="none">
          <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.488.488 0 0 0-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 0 0-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.56-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .43-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.03-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>
        </svg>
      </button>
    </div>
    <div id="content" class="hidden"></div>
    <div id="loading" class="hidden">Generant resum...</div>
    <div id="error" class="hidden"></div>
  </div>
  
  <div id="footer-status" class="hidden">
      <select id="model-select" aria-label="Selecciona Model">
          <!-- Options populated by JS -->
      </select>
      <span class="separator">|</span>
      <span id="generation-timer">0.0s</span>
      <span class="separator">|</span>
      <span id="quota-count" style="font-size: 0.9em;">Enviats: 0</span>
      <span class="separator">|</span>
      <span id="quota-reset" style="font-size: 0.9em;">Rebuts: 0</span>
  </div>
  <script src="sidebar.js"></script>
</body>
</html>
